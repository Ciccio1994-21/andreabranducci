<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template Concessionaria</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; margin: 0; min-height: 100vh; }
        .hero-bg {
            background: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.8)), 
                        url('https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?auto=format&fit=crop&q=80&w=1600');
            background-size: cover;
            background-position: center;
        }
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: white; z-index: 1000;
            transition: opacity 0.5s ease;
        }
        .social-icon-img {
            width: 32px;
            height: 32px;
            object-fit: contain;
            transition: transform 0.3s ease;
        }
        .social-link:hover .social-icon-img {
            transform: scale(1.15);
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    <div id="loader">
        <div class="flex flex-col items-center gap-4">
            <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-red-600"></div>
            <p class="text-xs font-bold uppercase tracking-widest text-slate-400">Caricamento...</p>
        </div>
    </div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // ==========================================
        // CONFIGURAZIONE DEL TEMPLATE
        // Modifica questi valori per adattare il sito 
        // a una nuova concessionaria
        // ==========================================
        const CONFIG = {
            // Dati Generali
            nomeConcessionaria: "Andrea Branducci",
            citta: "Savignano",
            provinciaBreve: "FC",
            provinciaEstesa: "Provincia di Forlì-Cesena",
            cap: "47039",
            
            // Testi Homepage
            sottotitoloHero: "Esperienza e passione: dal noleggio alla compravendita di auto usate garantite.",
            descrizioneFooter: "Vendita e noleggio auto usate garantite. Trent'anni di esperienza imprenditoriale al tuo servizio.",
            
            // Contatti
            indirizzo: "Via Circonvallazione 84",
            telefonoMostrato: "331.6824798",
            telefonoLink: "+393316824798",
            whatsappNumber: "393316824798",
            email: "andreabranducci@yahoo.it",
            
            // Social e Link Esterni
            social: {
                instagram: "https://www.instagram.com/autonoleggio.vendita.enjoywork/",
                facebook: "https://www.facebook.com/autonoleggio.vendita.enjoywork?locale=it_IT",
                autosupermarket: "https://autosupermarket.it/concessionari/branducci-auto?srsltid=AfmBOoqeWF3KAnf4e79lAOoyRRo2acUXA08A0quCq9aCI8z54oCNhwDj"
            },
            linkGoogleFormValutazione: "https://docs.google.com/forms/d/e/1FAIpQLSeYtcqgrOejvWqClIlEUneC2LPtTNzf67413H_mxFtcnGdnbw/viewform?embedded=true",
            
            // Sezione "Chi Siamo"
            chiSiamo: {
                titoloOrigini: "Dall'arredamento ai motori",
                paragrafo1: "La storia di Andrea Branducci affonda le radici in trent'anni di esperienza nel settore del commercio con \"Branducci Casa\". Nel 2012, ritrovandosi con alcuni mezzi aziendali fermi, ha l'intuizione di iniziare a noleggiare i primi camion.",
                paragrafo2: "Quella che è iniziata quasi per gioco si è trasformata in una vera e propria passione per la compravendita di automobili. Grazie all'esperienza maturata sul campo, Andrea ha deciso di espandere i propri locali, rendendo la vendita di auto usate l'attività primaria dell'azienda, con l'obiettivo di offrire vetture sicure, controllate e di qualità.",
                citazione: "Ho iniziato per gioco, ma l'esperienza e la passione mi hanno portato a trasformare questo mondo nella mia attività principale. Ogni veicolo che propongo è selezionato con la stessa cura che dedicavo ai miei clienti storici.",
                nomeFondatore: "Andrea Branducci",
                ruoloFondatore: "Titolare e Fondatore",
                inizialeFondatore: "A"
            },

            // Database Firebase (Nuova configurazione)
            firebase: {
                apiKey: "AIzaSyCB5yV6u4DtzUFb0jADUJobh8In52JNzp4",
                authDomain: "maxcar-7416d.firebaseapp.com",
                projectId: "maxcar-7416d",
                storageBucket: "maxcar-7416d.firebasestorage.app",
                messagingSenderId: "279232212865",
                appId: "1:279232212865:web:9cd8ff611b579f59bb4280",
                measurementId: "G-8JEB1FV5K6"
            },
            // L'ID del database per scaricare le auto di questa specifica concessionaria
            dbAppId: "andrea-branducci" 
        };
        // ==========================================

        if (!firebase.apps.length) firebase.initializeApp(CONFIG.firebase);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const COLLECTION_PATH = `artifacts/${CONFIG.dbAppId}/public/data/automobili`;

        const IG_ICON = "https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg";
        const FB_ICON = "https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg";
        const LOGO_PRINCIPALE = "Progetto senza titolo-4.png";
        const LOGO_AUTOSUPERMARKET = "unnamed.png";
        const LOGO_AMWAY = "amway.png";
        const LOGO_MAGAZZINI = "magazzini-branducci.png";

        const App = () => {
            const [currentPage, setCurrentPage] = useState('home');
            const [selectedCar, setSelectedCar] = useState(null);
            const [autoList, setAutoList] = useState([]);
            const [filter, setFilter] = useState('Auto Usate');
            const [loading, setLoading] = useState(true);
            const [activeImage, setActiveImage] = useState(null);
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            
            // Nuovi stati per i filtri avanzati del Piazzale
            const [showMobileFilters, setShowMobileFilters] = useState(false);
            const [filters, setFilters] = useState({
                searchQuery: '',
                marca: '',
                categoria: 'Tutte',
                prezzoMax: '',
                annoMin: '',
                kmMax: '',
                alimentazione: '',
                cambio: ''
            });

            // Gestione dei filtri
            const handleFilterChange = (e) => {
                const { name, value } = e.target;
                setFilters(prev => ({ ...prev, [name]: value }));
            };

            const resetFilters = () => {
                setFilters({ searchQuery: '', marca: '', categoria: 'Tutte', prezzoMax: '', annoMin: '', kmMax: '', alimentazione: '', cambio: '' });
            };

            // Dati derivati per le opzioni dei filtri
            const marcheDisponibili = useMemo(() => [...new Set(autoList.map(a => a.marca))].sort(), [autoList]);
            const alimentazioniDisponibili = useMemo(() => [...new Set(autoList.map(a => a.alimentazione))].sort(), [autoList]);
            const cambiDisponibili = useMemo(() => [...new Set(autoList.map(a => a.cambio || 'Manuale'))].sort(), [autoList]);

            // Filtraggio logico per il Piazzale
            const autoFiltrate = useMemo(() => {
                return autoList.filter(car => {
                    const matchSearch = !filters.searchQuery || `${car.marca} ${car.modello} ${car.descrizione || ''}`.toLowerCase().includes(filters.searchQuery.toLowerCase());
                    const matchMarca = !filters.marca || car.marca === filters.marca;
                    const matchCategoria = filters.categoria === 'Tutte' || car.categoria === filters.categoria;
                    const matchPrezzo = !filters.prezzoMax || Number(car.prezzo) <= Number(filters.prezzoMax);
                    const matchAnno = !filters.annoMin || Number(car.anno) >= Number(filters.annoMin);
                    const matchKm = !filters.kmMax || Number(car.km) <= Number(filters.kmMax);
                    const matchAlimentazione = !filters.alimentazione || car.alimentazione === filters.alimentazione;
                    const matchCambio = !filters.cambio || (car.cambio || 'Manuale') === filters.cambio;
                    
                    return matchSearch && matchMarca && matchCategoria && matchPrezzo && matchAnno && matchKm && matchAlimentazione && matchCambio;
                });
            }, [autoList, filters]);

            // Filtraggio semplice per la vetrina della Home (mostra max 6 auto)
            const homeAutoFiltrate = useMemo(() => {
                return autoList.filter(a => {
                    if (filter === 'Auto Usate') {
                        // Mostra tutto ciò che non è Noleggio
                        return !(a.categoria?.includes('Noleggio'));
                    } else if (filter === 'Auto a Noleggio') {
                        // Mostra solo ciò che è Noleggio
                        return a.categoria?.includes('Noleggio');
                    }
                    return true;
                }).slice(0, 6);
            }, [autoList, filter]);

            // Auto specifiche per il Noleggio a Lungo Termine
            const lungoTermineCars = useMemo(() => {
                return autoList.filter(car => car.categoria === 'Noleggio a Lungo Termine');
            }, [autoList]);

            // Aggiorna il titolo del documento dinamicamente
            useEffect(() => {
                document.title = `${CONFIG.nomeConcessionaria} | ${CONFIG.citta}`;
            }, []);

            useEffect(() => {
                const init = async () => {
                    try {
                        await auth.signInAnonymously();
                        const unsubscribe = db.collection(COLLECTION_PATH)
                            .orderBy('createdAt', 'desc')
                            .onSnapshot(snapshot => {
                                const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                                setAutoList(data);
                                setLoading(false);
                                const loader = document.getElementById('loader');
                                if (loader) loader.style.opacity = '0';
                                setTimeout(() => { if (loader) loader.style.display = 'none'; }, 500);
                            }, (err) => {
                                console.error("Errore database:", err);
                                setLoading(false);
                            });
                        return () => unsubscribe();
                    } catch (error) {
                        console.error("Errore Auth:", error);
                    }
                };
                init();
            }, []);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [currentPage, autoList, filter, filters, selectedCar, isMobileMenuOpen, showMobileFilters]);

            useEffect(() => {
                window.scrollTo(0, 0);
            }, [currentPage, selectedCar]);

            const openCarDetails = (car) => {
                setSelectedCar(car);
                setActiveImage(car.immagine);
                setCurrentPage('prodotto');
            };

            const carImages = useMemo(() => {
                if (!selectedCar) return [];
                const images = [selectedCar.immagine];
                if (selectedCar.galleria && Array.isArray(selectedCar.galleria)) {
                    selectedCar.galleria.forEach(img => {
                        if (img !== selectedCar.immagine) images.push(img);
                    });
                }
                return images;
            }, [selectedCar]);

            return (
                <div className="min-h-screen flex flex-col bg-slate-50 overflow-x-hidden w-full">
                    {/* Header Fisso */}
                    <header className="sticky top-0 z-50 w-full flex flex-col shadow-sm">
                        {/* Top Bar Magazzini Branducci */}
                        <div className="bg-slate-100 border-b py-2 px-6 w-full">
                            <div className="max-w-[90rem] mx-auto flex justify-end items-center">
                                <a href="https://www.magazzinibranducci.com/" target="_blank" className="flex items-center gap-3 group">
                                    <span className="text-[9px] uppercase font-bold tracking-widest text-slate-500 group-hover:text-red-600 transition hidden sm:inline">Visita anche il nostro store:</span>
                                    <img src={LOGO_MAGAZZINI} className="h-4 md:h-5 object-contain opacity-80 group-hover:opacity-100 transition" alt="Magazzini Branducci"/>
                                </a>
                            </div>
                        </div>

                        {/* Navigazione Principale */}
                        <nav className="bg-white/95 backdrop-blur-md px-6 py-4 w-full">
                            <div className="max-w-[90rem] mx-auto flex justify-between items-center gap-4">
                                <div className="flex items-center gap-2 cursor-pointer flex-shrink-0" onClick={() => { setCurrentPage('home'); setSelectedCar(null); setIsMobileMenuOpen(false); }}>
                                    <img src={LOGO_PRINCIPALE} alt={CONFIG.nomeConcessionaria} className="h-12 md:h-16 object-contain" />
                                </div>
                                
                                {/* Desktop Menu */}
                                <div className="hidden lg:flex flex-wrap justify-end gap-x-6 gap-y-2 text-[10px] xl:text-xs font-bold uppercase tracking-widest text-slate-500 items-center">
                                    <button onClick={() => { setCurrentPage('home'); setSelectedCar(null); }} className={`hover:text-red-600 transition ${currentPage === 'home' ? 'text-red-600' : ''}`}>Home</button>
                                    <button onClick={() => { setCurrentPage('piazzale'); setSelectedCar(null); }} className={`hover:text-red-600 transition ${currentPage === 'piazzale' ? 'text-red-600' : ''}`}>Piazzale</button>
                                    <button onClick={() => { setCurrentPage('vendi'); setSelectedCar(null); }} className={`hover:text-red-600 transition ${currentPage === 'vendi' ? 'text-red-600' : ''}`}>Vendi Auto</button>
                                    <button onClick={() => { setCurrentPage('lungo-termine'); setSelectedCar(null); }} className={`hover:text-red-600 transition ${currentPage === 'lungo-termine' ? 'text-red-600' : ''}`}>Lungo Termine</button>
                                    <button onClick={() => { setCurrentPage('amway'); setSelectedCar(null); }} className={`hover:text-red-600 transition ${currentPage === 'amway' ? 'text-red-600' : ''}`}>Amway</button>
                                    <button onClick={() => { setCurrentPage('chisiamo'); setSelectedCar(null); }} className={`hover:text-red-600 transition ${currentPage === 'chisiamo' ? 'text-red-600' : ''}`}>Chi Siamo</button>
                                    <button onClick={() => { setCurrentPage('contatti'); setSelectedCar(null); }} className={`hover:text-red-600 transition ${currentPage === 'contatti' ? 'text-red-600' : ''}`}>Contatti</button>
                                </div>

                                {/* Mobile Menu Button */}
                                <button className="lg:hidden text-slate-900 focus:outline-none p-2 flex-shrink-0" onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)}>
                                    <i data-lucide={isMobileMenuOpen ? "x" : "menu"} className="w-6 h-6"></i>
                                </button>
                            </div>

                            {/* Mobile Dropdown */}
                            {isMobileMenuOpen && (
                                <div className="lg:hidden absolute top-full left-0 w-full bg-white border-b shadow-2xl flex flex-col py-6 px-8 gap-6 text-sm font-bold uppercase tracking-widest text-slate-600 animate-in slide-in-from-top-2 duration-300">
                                    <button onClick={() => { setCurrentPage('home'); setSelectedCar(null); setIsMobileMenuOpen(false); }} className={`text-left hover:text-red-600 transition ${currentPage === 'home' ? 'text-red-600' : ''}`}>Home</button>
                                    <button onClick={() => { setCurrentPage('piazzale'); setSelectedCar(null); setIsMobileMenuOpen(false); }} className={`text-left hover:text-red-600 transition ${currentPage === 'piazzale' ? 'text-red-600' : ''}`}>Piazzale</button>
                                    <button onClick={() => { setCurrentPage('vendi'); setSelectedCar(null); setIsMobileMenuOpen(false); }} className={`text-left hover:text-red-600 transition ${currentPage === 'vendi' ? 'text-red-600' : ''}`}>Vendi Auto</button>
                                    <button onClick={() => { setCurrentPage('lungo-termine'); setSelectedCar(null); setIsMobileMenuOpen(false); }} className={`text-left hover:text-red-600 transition ${currentPage === 'lungo-termine' ? 'text-red-600' : ''}`}>Lungo Termine</button>
                                    <button onClick={() => { setCurrentPage('amway'); setSelectedCar(null); setIsMobileMenuOpen(false); }} className={`text-left hover:text-red-600 transition ${currentPage === 'amway' ? 'text-red-600' : ''}`}>Amway</button>
                                    <button onClick={() => { setCurrentPage('chisiamo'); setSelectedCar(null); setIsMobileMenuOpen(false); }} className={`text-left hover:text-red-600 transition ${currentPage === 'chisiamo' ? 'text-red-600' : ''}`}>Chi Siamo</button>
                                    <button onClick={() => { setCurrentPage('contatti'); setSelectedCar(null); setIsMobileMenuOpen(false); }} className={`text-left hover:text-red-600 transition ${currentPage === 'contatti' ? 'text-red-600' : ''}`}>Contatti</button>
                                </div>
                            )}
                        </nav>
                    </header>

                    <main className="flex-grow w-full">
                        {currentPage === 'home' && (
                            <>
                                <div className="hero-bg min-h-[80vh] flex items-center justify-center text-center text-white px-4">
                                    <div className="max-w-3xl animate-in fade-in slide-in-from-bottom-10 duration-1000">
                                        <h1 className="text-6xl md:text-8xl font-extrabold uppercase italic tracking-tighter mb-6">{CONFIG.nomeConcessionaria} <span className="text-red-600">{CONFIG.citta}</span></h1>
                                        <p className="text-xl md:text-2xl font-light mb-10 text-slate-200">{CONFIG.sottotitoloHero}</p>
                                        <div className="flex flex-col md:flex-row gap-4 justify-center">
                                            <button onClick={() => setCurrentPage('piazzale')} className="bg-red-600 hover:bg-red-700 px-12 py-5 rounded-xl font-bold uppercase transition shadow-2xl hover:scale-105 transform">Esplora il Piazzale</button>
                                            <a href={`tel:${CONFIG.telefonoLink}`} className="bg-white/10 hover:bg-white/20 backdrop-blur-md px-12 py-5 rounded-xl font-bold uppercase transition border border-white/20">Chiama Ora</a>
                                        </div>
                                    </div>
                                </div>
                                <div className="py-20 px-6 bg-white border-y">
                                    <div className="max-w-7xl mx-auto grid md:grid-cols-3 gap-12">
                                        <div className="flex flex-col items-center text-center">
                                            <div className="w-16 h-16 bg-red-50 text-red-600 rounded-3xl flex items-center justify-center mb-6 shadow-sm"><i data-lucide="shield-check" className="w-8 h-8"></i></div>
                                            <h3 className="font-black uppercase italic text-xl mb-3">Garanzia Totale</h3>
                                            <p className="text-slate-500 text-sm leading-relaxed">Offriamo garanzie complete fino a 36 mesi su ogni veicolo per la tua massima tranquillità.</p>
                                        </div>
                                        <div className="flex flex-col items-center text-center">
                                            <div className="w-16 h-16 bg-red-50 text-red-600 rounded-3xl flex items-center justify-center mb-6 shadow-sm"><i data-lucide="wallet" className="w-8 h-8"></i></div>
                                            <h3 className="font-black uppercase italic text-xl mb-3">Finanziamenti</h3>
                                            <p className="text-slate-500 text-sm leading-relaxed">Soluzioni finanziarie personalizzate e flessibili per permetterti di guidare l'auto dei tuoi sogni.</p>
                                        </div>
                                        <div className="flex flex-col items-center text-center">
                                            <div className="w-16 h-16 bg-red-50 text-red-600 rounded-3xl flex items-center justify-center mb-6 shadow-sm"><i data-lucide="zap" className="w-8 h-8"></i></div>
                                            <h3 className="font-black uppercase italic text-xl mb-3">Velocità</h3>
                                            <p className="text-slate-500 text-sm leading-relaxed">Pratiche rapide e compravendita sicura. Siamo operativi in tutta la zona e dintorni.</p>
                                        </div>
                                    </div>
                                </div>
                            </>
                        )}
                        
                        {currentPage === 'home' && (
                            <div className="py-16 px-6 max-w-[90rem] mx-auto">
                                <div className="flex flex-col md:flex-row justify-between items-center mb-12 gap-6 border-b pb-8">
                                    <h2 className="text-4xl font-black uppercase italic tracking-tight flex-shrink-0">Vetrina <span className="text-red-600 underline">Occasioni</span></h2>
                                    <div className="flex gap-2 bg-white p-1 rounded-full shadow-sm border overflow-x-auto max-w-full custom-scrollbar pb-2 md:pb-0">
                                        {['Auto Usate', 'Auto a Noleggio'].map(c => (
                                            <button key={c} onClick={() => setFilter(c)} className={`whitespace-nowrap px-4 md:px-6 py-2 rounded-full text-[10px] font-bold uppercase transition ${filter === c ? 'bg-red-600 text-white shadow-md' : 'text-slate-500 hover:bg-slate-50'}`}>{c}</button>
                                        ))}
                                    </div>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10 mb-12">
                                    {homeAutoFiltrate.map(car => (
                                        <div key={car.id} onClick={() => openCarDetails(car)} className="bg-white rounded-[2rem] overflow-hidden shadow-xl hover:shadow-2xl transition duration-500 border border-slate-100 group cursor-pointer">
                                            <div className="h-64 overflow-hidden relative">
                                                <img src={car.immagine} className="w-full h-full object-cover group-hover:scale-110 transition duration-700" alt={car.modello} />
                                                <div className="absolute top-4 left-4 bg-white/90 backdrop-blur px-3 py-1 rounded-full text-[10px] font-black text-slate-900 shadow-sm uppercase tracking-widest">{car.categoria}</div>
                                                <div className="absolute bottom-4 right-4 bg-red-600 text-white px-4 py-2 rounded-2xl font-black text-xl shadow-lg">€{Number(car.prezzo)?.toLocaleString()} {car.categoria?.includes('Noleggio') ? '/ mese' : ''}</div>
                                            </div>
                                            <div className="p-8">
                                                <h3 className="font-black uppercase text-2xl mb-1 tracking-tighter text-slate-900 leading-none">{car.marca}</h3>
                                                <p className="text-red-600 font-bold uppercase text-sm mb-4">{car.modello}</p>
                                                <div className="flex items-center justify-between text-slate-400 text-[10px] font-bold uppercase border-t pt-4">
                                                    <span className="flex items-center gap-1"><i data-lucide="calendar" className="w-3 h-3 text-red-600"></i> {car.anno}</span>
                                                    <span className="flex items-center gap-1"><i data-lucide="gauge" className="w-3 h-3 text-red-600"></i> {Number(car.km)?.toLocaleString()} KM</span>
                                                    <span className="flex items-center gap-1"><i data-lucide="fuel" className="w-3 h-3 text-red-600"></i> {car.alimentazione}</span>
                                                </div>
                                                <button className="w-full mt-8 bg-slate-900 text-white py-4 rounded-xl font-bold text-[11px] uppercase tracking-widest group-hover:bg-red-600 transition duration-300">Visualizza Dettagli</button>
                                            </div>
                                        </div>
                                    ))}
                                    {homeAutoFiltrate.length === 0 && (
                                        <div className="col-span-1 md:col-span-2 lg:col-span-3 text-center py-12">
                                            <p className="text-slate-500 font-bold uppercase text-sm tracking-widest">Nessun veicolo trovato per questa selezione.</p>
                                        </div>
                                    )}
                                </div>
                                <div className="text-center">
                                    <button onClick={() => setCurrentPage('piazzale')} className="bg-slate-900 text-white px-10 py-4 rounded-xl font-bold uppercase tracking-widest text-xs hover:bg-red-600 transition shadow-lg">Vedi Tutto il Piazzale</button>
                                </div>
                            </div>
                        )}

                        {currentPage === 'piazzale' && (
                            <div className="py-12 px-6 max-w-[90rem] mx-auto animate-in fade-in duration-700">
                                <div className="flex flex-col md:flex-row justify-between items-end mb-8 border-b pb-8 gap-4">
                                    <div>
