<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionale Andrea Branducci</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        input, select, textarea { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; transition: all 0.3s; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #dc2626; background: rgba(255,255,255,0.1); }
        option { background-color: #1e293b; color: white; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyCB5yV6u4DtzUFb0jADUJobh8In52JNzp4",
            authDomain: "maxcar-7416d.firebaseapp.com",
            projectId: "maxcar-7416d",
            storageBucket: "maxcar-7416d.firebasestorage.app",
            messagingSenderId: "279232212865",
            appId: "1:279232212865:web:9cd8ff611b579f59bb4280",
            measurementId: "G-8JEB1FV5K6"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const appId = "andrea-branducci";
        const COLLECTION_PATH = `artifacts/${appId}/public/data/automobili`;

        const App = () => {
            const [autoList, setAutoList] = useState([]);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [editingId, setEditingId] = useState(null);
            
            // Nuovi stati per i filtri di ricerca nel gestionale
            const [searchMarca, setSearchMarca] = useState('');
            const [showOnlyLungoTermine, setShowOnlyLungoTermine] = useState(false);
            
            // Stato per l'immagine del libretto ingrandita
            const [expandedLibretto, setExpandedLibretto] = useState(null);
            
            const initialForm = {
                marca: '', modello: '', prezzo: '', anno: '', km: '', 
                alimentazione: 'Diesel', categoria: 'SUV', descrizione: '', 
                immagini: [], potenza: '', cilindrata: '', colore: '',
                // Nuovi campi privati per Conto Vendita
                isContoVendita: false, contoProprietario: '', contoUbicazione: '', 
                contoRichiesta: '', contoSpese: '', fotoLibretto: ''
            };
            
            const [newCar, setNewCar] = useState(initialForm);

            useEffect(() => {
                auth.signInAnonymously().catch(console.error);
                const unsubscribe = db.collection(COLLECTION_PATH)
                    .orderBy('createdAt', 'desc')
                    .onSnapshot(snapshot => {
                        setAutoList(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if(window.lucide) window.lucide.createIcons();
            });

            const handleImageUpload = (e) => {
                const files = Array.from(e.target.files);
                if(files.length + newCar.immagini.length > 10) return alert("Massimo 10 foto permesse.");
                
                files.forEach(file => {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            let width = img.width;
                            let height = img.height;
                            const MAX_SIZE = 1200; 
                            if (width > MAX_SIZE || height > MAX_SIZE) {
                                if (width > height) { height *= MAX_SIZE / width; width = MAX_SIZE; } 
                                else { width *= MAX_SIZE / height; height = MAX_SIZE; }
                            }
                            canvas.width = width; canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            const resizedDataUrl = canvas.toDataURL('image/jpeg', 0.8);
                            setNewCar(prev => ({...prev, immagini: [...prev.immagini, resizedDataUrl]}));
                        };
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                });
                e.target.value = "";
            };

            const removeImage = (index) => {
                setNewCar(prev => ({
                    ...prev,
                    immagini: prev.immagini.filter((_, i) => i !== index)
                }));
            };

            const handleLibretto = (e) => {
                const file = e.target.files[0];
                if(!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        const MAX_SIZE = 1024; 
                        if (width > MAX_SIZE || height > MAX_SIZE) {
                            if (width > height) { height *= MAX_SIZE / width; width = MAX_SIZE; } 
                            else { width *= MAX_SIZE / height; height = MAX_SIZE; }
                        }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        setNewCar(prev => ({ ...prev, fotoLibretto: canvas.toDataURL('image/jpeg', 0.6) }));
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
                e.target.value = "";
            };

            const startEdit = (car) => {
                setEditingId(car.id);
                setNewCar({
                    marca: car.marca || '',
                    modello: car.modello || '',
                    prezzo: car.prezzo || '',
                    anno: car.anno || '',
                    km: car.km || '',
                    alimentazione: car.alimentazione || 'Diesel',
                    categoria: car.categoria || 'SUV',
                    descrizione: car.descrizione || '',
                    potenza: car.potenza || '',
                    cilindrata: car.cilindrata || '',
                    colore: car.colore || '',
                    immagini: car.galleria || (car.immagine ? [car.immagine] : []),
                    isContoVendita: car.isContoVendita || false,
                    contoProprietario: car.contoProprietario || '',
                    contoUbicazione: car.contoUbicazione || '',
                    contoRichiesta: car.contoRichiesta || '',
                    contoSpese: car.contoSpese || '',
                    fotoLibretto: car.fotoLibretto || ''
                });
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const cancelEdit = () => {
                setEditingId(null);
                setNewCar(initialForm);
            };

            const saveCar = async (e) => {
                e.preventDefault();
                if (newCar.immagini.length === 0) return alert("Inserisci almeno una foto!");
                
                setIsSubmitting(true);
                try {
                    // Creiamo l'oggetto da inviare pulendo i valori numerici
                    const payload = {
                        marca: newCar.marca,
                        modello: newCar.modello,
                        prezzo: Number(newCar.prezzo),
                        km: Number(newCar.km),
                        anno: Number(newCar.anno),
                        alimentazione: newCar.alimentazione,
                        categoria: newCar.categoria,
                        descrizione: newCar.descrizione,
                        potenza: newCar.potenza ? Number(newCar.potenza) : null,
                        cilindrata: newCar.cilindrata ? Number(newCar.cilindrata) : null,
                        colore: newCar.colore || '',
                        immagine: newCar.immagini[0], 
                        galleria: newCar.immagini,
                        // Campi interni privati (conto vendita)
                        isContoVendita: newCar.isContoVendita,
                        contoProprietario: newCar.isContoVendita ? newCar.contoProprietario : null,
                        contoUbicazione: newCar.isContoVendita ? newCar.contoUbicazione : null,
                        contoRichiesta: newCar.isContoVendita ? Number(newCar.contoRichiesta) : null,
                        contoSpese: newCar.isContoVendita ? Number(newCar.contoSpese) : null,
                        fotoLibretto: newCar.isContoVendita ? newCar.fotoLibretto : null,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    };

                    if (editingId) {
                        await db.collection(COLLECTION_PATH).doc(editingId).update(payload);
                    } else {
                        payload.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                        await db.collection(COLLECTION_PATH).add(payload);
                    }
                    setNewCar(initialForm);
                    setEditingId(null);
                } catch (error) {
                    console.error("Errore salvataggio:", error);
                    alert("Errore durante il salvataggio.");
                }
                setIsSubmitting(false);
            };

            const deleteCar = async (id) => {
                if(confirm("Eliminare definitivamente questo annuncio?")) {
                    await db.collection(COLLECTION_PATH).doc(id).delete();
                }
            };

            // Filtraggio lista auto in tempo reale per il gestionale
            const filteredAutoList = autoList.filter(car => {
                const matchMarca = !searchMarca || car.marca?.toLowerCase().includes(searchMarca.toLowerCase());
                const matchNoleggio = !showOnlyLungoTermine || car.categoria === 'Noleggio a Lungo Termine';
                return matchMarca && matchNoleggio;
            });

            return (
                <div className="min-h-screen p-4 md:p-8">
                    {/* Overlay per l'ingrandimento del libretto */}
                    {expandedLibretto && (
                        <div className="fixed inset-0 z-[100] bg-black/90 flex items-center justify-center p-4 animate-in fade-in duration-200" onClick={() => setExpandedLibretto(null)}>
                            <div className="relative max-w-4xl max-h-[90vh] flex flex-col items-center">
                                <button 
                                    className="absolute -top-12 right-0 text-white hover:text-red-500 transition-colors bg-white/10 rounded-full p-2"
                                    onClick={(e) => { e.stopPropagation(); setExpandedLibretto(null); }}
                                    title="Chiudi visualizzazione"
                                >
                                    <i data-lucide="x" className="w-6 h-6"></i>
                                </button>
                                <img src={expandedLibretto} alt="Libretto Ingrandito" className="max-w-full max-h-[85vh] object-contain rounded-lg border border-white/20 shadow-2xl" />
                            </div>
                        </div>
                    )}

                    <header className="mb-8 bg-slate-900 border border-white/10 rounded-3xl p-6 shadow-2xl relative overflow-hidden">
                        <div className="absolute top-0 right-0 w-64 h-64 bg-red-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20 transform translate-x-1/2 -translate-y-1/2"></div>
                        <div className="flex items-center gap-4 relative z-10">
                            <div className="bg-red-600 p-3 rounded-2xl shadow-lg shadow-red-600/20 text-white">
                                <i data-lucide="layout-dashboard" className="w-6 h-6"></i>
                            </div>
                            <div>
                                <h1 className="text-2xl font-black uppercase tracking-tighter italic">Gestionale <span className="text-red-600">Andrea Branducci</span></h1>
                                <p className="text-[10px] uppercase tracking-[0.2em] text-slate-500 font-bold">Controllo Stock Piazzale</p>
                            </div>
                        </div>
                    </header>

                    {/* CORREZIONE LAYOUT: Rimosso effetto sticky per evitare sovrapposizioni */}
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        {/* Form di Inserimento (Colonna 1) */}
                        <div className="glass p-6 md:p-8 rounded-[2rem] shadow-2xl border-t border-white/10 self-start w-full">
                            <div className="flex justify-between items-center mb-6">
                                <h2 className="text-xl font-black uppercase italic tracking-tighter flex items-center gap-2">
                                    {editingId ? <><i data-lucide="edit" className="w-5 h-5 text-red-500"></i> Modifica</> : <><i data-lucide="plus-circle" className="w-5 h-5 text-red-500"></i> Inserisci</>} Veicolo
                                </h2>
                                {editingId && <button onClick={cancelEdit} className="text-xs text-slate-400 hover:text-white uppercase font-bold underline">Annulla</button>}
                            </div>

                            <form onSubmit={saveCar} className="space-y-4">
                                <div className="space-y-3">
                                    <div className="grid grid-cols-2 gap-3">
                                        <input required placeholder="Marca (es. Audi)" className="p-3 rounded-xl text-sm" value={newCar.marca} onChange={e => setNewCar({...newCar, marca: e.target.value.toUpperCase()})} />
                                        <input required placeholder="Modello" className="p-3 rounded-xl text-sm" value={newCar.modello} onChange={e => setNewCar({...newCar, modello: e.target.value.toUpperCase()})} />
                                    </div>
                                    <div className="grid grid-cols-3 gap-3">
                                        <input required type="number" placeholder="Prezzo (€)" className="p-3 rounded-xl text-sm" value={newCar.prezzo} onChange={e => setNewCar({...newCar, prezzo: e.target.value})} />
                                        <input required type="number" placeholder="Anno" className="p-3 rounded-xl text-sm" value={newCar.anno} onChange={e => setNewCar({...newCar, anno: e.target.value})} />
                                        <input required type="number" placeholder="Km" className="p-3 rounded-xl text-sm" value={newCar.km} onChange={e => setNewCar({...newCar, km: e.target.value})} />
                                    </div>
                                    
                                    <div className="grid grid-cols-3 gap-3">
                                        <input type="number" placeholder="Potenza (CV)" className="p-3 rounded-xl text-sm" value={newCar.potenza} onChange={e => setNewCar({...newCar, potenza: e.target.value})} />
                                        <input type="number" placeholder="Cilindrata (cc)" className="p-3 rounded-xl text-sm" value={newCar.cilindrata} onChange={e => setNewCar({...newCar, cilindrata: e.target.value})} />
                                        <input placeholder="Colore" className="p-3 rounded-xl text-sm" value={newCar.colore} onChange={e => setNewCar({...newCar, colore: e.target.value})} />
                                    </div>

                                    <div className="grid grid-cols-2 gap-3">
                                        <select className="p-3 rounded-xl text-sm" value={newCar.alimentazione} onChange={e => setNewCar({...newCar, alimentazione: e.target.value})}>
                                            <option>Diesel</option>
                                            <option>Benzina</option>
                                            <option>Ibrida</option>
                                            <option>Elettrica</option>
                                            <option>GPL</option>
                                            <option>Metano</option>
                                        </select>
                                        <select className="p-3 rounded-xl text-sm" value={newCar.categoria} onChange={e => setNewCar({...newCar, categoria: e.target.value})}>
                                            <option>SUV</option>
                                            <option>Berlina</option>
                                            <option>Utilitaria</option>
                                            <option>Station Wagon</option>
                                            <option>Coupé</option>
                                            <option>Furgone</option>
                                            <option>Fuori Strada</option>
                                            <option>Auto d'epoca</option>
                                            <option>Noleggio Giornaliero</option>
                                            <option>Noleggio a Lungo Termine</option>
                                            <option>Auto da Riparare</option>
                                            <option>Camion</option>
                                            <option>Altri Veicoli</option>
                                        </select>
                                    </div>

                                    <textarea 
                                        placeholder="Descrizione tecnica e optional..." 
                                        className="w-full p-3 rounded-xl text-sm min-h-[100px] resize-none"
                                        value={newCar.descrizione}
                                        onChange={e => setNewCar({...newCar, descrizione: e.target.value})}
                                    ></textarea>

                                    {/* Sezione Conto Vendita (Solo Interno) */}
                                    <div className="border border-white/10 rounded-2xl p-4 bg-white/5 space-y-4">
                                        <label className="flex items-center gap-3 cursor-pointer w-fit">
                                            <input type="checkbox" className="w-5 h-5 rounded border-white/20 bg-transparent text-red-600 focus:ring-red-600 focus:ring-offset-slate-900 cursor-pointer" 
                                                checked={newCar.isContoVendita} 
                                                onChange={e => setNewCar({...newCar, isContoVendita: e.target.checked})} 
                                            />
                                            <span className="font-bold text-sm text-red-400 uppercase tracking-widest">Auto in Conto Vendita</span>
                                        </label>
                                        
                                        {newCar.isContoVendita && (
                                            <div className="grid grid-cols-1 gap-3 animate-in fade-in slide-in-from-top-2 duration-300 pt-2 border-t border-white/10 mt-2">
                                                <div className="grid grid-cols-2 gap-3">
                                                    <input placeholder="Proprietario (Nome Cognome)" className="p-3 rounded-xl text-sm bg-slate-800" value={newCar.contoProprietario} onChange={e => setNewCar({...newCar, contoProprietario: e.target.value})} />
                                                    <input placeholder="Ubicazione Attuale" className="p-3 rounded-xl text-sm bg-slate-800" value={newCar.contoUbicazione} onChange={e => setNewCar({...newCar, contoUbicazione: e.target.value})} />
                                                </div>
                                                <div className="grid grid-cols-2 gap-3">
                                                    <input type="number" placeholder="Richiesta Proprietario (€)" className="p-3 rounded-xl text-sm bg-slate-800" value={newCar.contoRichiesta} onChange={e => setNewCar({...newCar, contoRichiesta: e.target.value})} />
                                                    <input type="number" placeholder="Spese Effettuate (€)" className="p-3 rounded-xl text-sm bg-slate-800" value={newCar.contoSpese} onChange={e => setNewCar({...newCar, contoSpese: e.target.value})} />
                                                </div>
                                                <div className="flex items-center gap-4 mt-2">
                                                    <label className="flex items-center justify-center gap-2 p-3 rounded-xl border border-white/10 bg-slate-900 hover:bg-slate-800 cursor-pointer transition flex-grow text-sm font-bold text-slate-300">
                                                        <i data-lucide="camera" className="w-4 h-4 text-slate-400"></i> Carica Foto Libretto
                                                        <input type="file" className="hidden" accept="image/*" onChange={handleLibretto} />
                                                    </label>
                                                    {newCar.fotoLibretto && (
                                                        <div 
                                                            className="w-12 h-12 rounded-lg overflow-hidden border border-white/20 flex-shrink-0 relative group cursor-pointer" 
                                                            onClick={() => setExpandedLibretto(newCar.fotoLibretto)}
                                                            title="Clicca per ingrandire"
                                                        >
                                                            <img src={newCar.fotoLibretto} className="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition" alt="Libretto" />
                                                            <div className="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition">
                                                                <i data-lucide="zoom-in" className="w-4 h-4 text-white"></i>
                                                            </div>
                                                            <button 
                                                                type="button" 
                                                                onClick={(e) => { e.stopPropagation(); setNewCar({...newCar, fotoLibretto: ''}); }} 
                                                                className="absolute -top-1 -right-1 bg-red-600 rounded-full w-4 h-4 flex items-center justify-center shadow-lg hover:scale-110 transition z-10"
                                                                title="Rimuovi foto libretto"
                                                            >
                                                                <i data-lucide="x" className="w-3 h-3 text-white"></i>
                                                            </button>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        )}
                                    </div>

                                    <div className="p-4 border border-white/10 rounded-2xl bg-white/5 border-dashed">
                                        <label className="flex flex-col items-center justify-center gap-2 cursor-pointer text-slate-400 hover:text-white transition">
                                            <i data-lucide="image-plus" className="w-8 h-8"></i>
                                            <span className="text-xs font-bold uppercase tracking-widest">Carica Immagini Auto</span>
                                            <input type="file" multiple accept="image/*" className="hidden" onChange={handleImageUpload} />
                                        </label>
                                        
                                        {newCar.immagini.length > 0 && (
                                            <div className="flex gap-2 overflow-x-auto mt-4 pb-2">
                                                {newCar.immagini.map((img, idx) => (
                                                    <div key={idx} className="relative w-16 h-16 flex-shrink-0 rounded-lg overflow-hidden border border-white/10 group">
                                                        <img src={img} className="w-full h-full object-cover" />
                                                        <button type="button" onClick={() => removeImage(idx)} className="absolute inset-0 bg-red-600/80 flex items-center justify-center opacity-0 group-hover:opacity-100 transition">
                                                            <i data-lucide="trash-2" className="w-4 h-4 text-white"></i>
                                                        </button>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>

                                    <button 
                                        disabled={isSubmitting}
                                        className="w-full bg-red-600 hover:bg-red-700 text-white p-4 rounded-xl font-black uppercase text-xs tracking-widest transition shadow-lg flex items-center justify-center gap-2 disabled:opacity-50"
                                    >
                                        {isSubmitting ? 'Salvataggio...' : (editingId ? 'Salva Modifiche' : 'Pubblica Online')}
                                    </button>
                                </div>
                            </form>
                        </div>

                        {/* Elenco auto caricate (Colonne 2 e 3) */}
                        <div className="lg:col-span-2 space-y-4 w-full">
                            <div className="flex flex-col md:flex-row justify-between items-start md:items-end mb-4 gap-4 border-b border-white/10 pb-4">
                                <div>
                                    <h2 className="font-bold uppercase tracking-widest text-xs text-slate-500 mb-1">Auto Online ({filteredAutoList.length})</h2>
                                    <p className="text-[10px] text-slate-500 font-bold uppercase italic">Andrea Branducci - Cloud Database</p>
                                </div>
                                
                                {/* Filtri di Ricerca Gestionale */}
                                <div className="flex flex-col sm:flex-row gap-2 w-full md:w-auto">
                                    <div className="relative">
                                        <i data-lucide="search" className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                                        <input 
                                            type="text" 
                                            placeholder="Cerca per Marca..." 
                                            className="pl-9 p-2 rounded-xl text-sm w-full sm:w-48 bg-slate-800"
                                            value={searchMarca}
                                            onChange={e => setSearchMarca(e.target.value)}
                                        />
                                    </div>
                                    <button 
                                        onClick={() => setShowOnlyLungoTermine(!showOnlyLungoTermine)}
                                        className={`flex items-center justify-center gap-2 px-4 py-2 rounded-xl text-[10px] font-bold uppercase tracking-widest transition border ${showOnlyLungoTermine ? 'bg-red-600 border-red-600 text-white' : 'bg-transparent border-white/20 text-slate-400 hover:text-white'}`}
                                    >
                                        <i data-lucide="calendar-clock" className="w-4 h-4"></i> Noleggio L.T.
                                    </button>
                                </div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {filteredAutoList.map(car => (
                                    <div key={car.id} className="glass p-4 rounded-3xl flex gap-4 items-center group relative overflow-hidden hover:bg-white/[0.05] transition-all border-white/5">
                                        <div className="w-24 h-24 rounded-2xl overflow-hidden flex-shrink-0 border border-white/5 bg-slate-800">
                                            <img src={car.immagine} className="w-full h-full object-cover" />
                                        </div>
                                        <div className="flex-grow">
                                            <h3 className="font-bold uppercase text-sm leading-tight text-white">{car.marca} <span className="text-red-600">{car.modello}</span></h3>
                                            <div className="text-[10px] text-slate-400 font-bold mt-1 uppercase">
                                                {car.anno} • {car.km?.toLocaleString()} KM • <span className="text-white">€{car.prezzo?.toLocaleString()}</span>
                                            </div>
                                            <div className="flex flex-wrap gap-2 mt-2">
                                                {car.isContoVendita && <span className="text-[8px] bg-orange-600/20 px-1.5 py-0.5 rounded text-orange-400 font-bold uppercase border border-orange-600/30 flex items-center gap-1"><i data-lucide="user" className="w-3 h-3"></i> Conto Vendita</span>}
                                                {car.potenza && <span className="text-[8px] bg-red-600/20 px-1.5 py-0.5 rounded text-red-400 font-bold uppercase">{car.potenza} CV</span>}
                                                {car.cilindrata && <span className="text-[8px] bg-slate-800 px-1.5 py-0.5 rounded text-slate-400 font-bold uppercase">{car.cilindrata} cc</span>}
                                                {car.colore && <span className="text-[8px] bg-slate-800 px-1.5 py-0.5 rounded text-slate-400 font-bold uppercase">{car.colore}</span>}
                                            </div>
                                        </div>
                                        
                                        {/* Azioni Hover List */}
                                        <div className="absolute right-4 top-1/2 -translate-y-1/2 flex flex-col gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                            {car.isContoVendita && car.fotoLibretto && (
                                                <button onClick={() => setExpandedLibretto(car.fotoLibretto)} className="bg-orange-600 p-2 rounded-xl text-white hover:bg-orange-700 transition shadow-lg" title="Vedi Libretto">
                                                    <i data-lucide="file-text" className="w-4 h-4"></i>
                                                </button>
                                            )}
                                            <button onClick={() => startEdit(car)} className="bg-slate-700 p-2 rounded-xl text-white hover:bg-slate-600 transition shadow-lg" title="Modifica">
                                                <i data-lucide="edit-2" className="w-4 h-4"></i>
                                            </button>
                                            <button onClick={() => deleteCar(car.id)} className="bg-red-600 p-2 rounded-xl text-white hover:bg-red-700 transition shadow-lg" title="Elimina">
                                                <i data-lucide="trash" className="w-4 h-4"></i>
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
