<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionale Andrea Branducci | Controllo Piazzale</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: white; margin: 0; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        input, select, textarea { background: rgba(255, 255, 255, 0.05) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: white !important; }
        input:focus, textarea:focus { border-color: #ef4444 !important; outline: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .img-card:first-child { border: 2px solid #ef4444; }
    </style>
</head>
<body class="custom-scrollbar">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyCB5yV6u4DtzUFb0jADUJobh8In52JNzp4",
            authDomain: "maxcar-7416d.firebaseapp.com",
            projectId: "maxcar-7416d",
            storageBucket: "maxcar-7416d.firebasestorage.app",
            messagingSenderId: "279232212865",
            appId: "1:279232212865:web:9cd8ff611b579f59bb4280",
            measurementId: "G-8JEB1FV5K6"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const appId = "andrea-branducci";
        const COLLECTION_PATH = `artifacts/${appId}/public/data/automobili`;

        const App = () => {
            const [autoList, setAutoList] = useState([]);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [editingId, setEditingId] = useState(null);
            
            // Nuovi stati per i filtri di ricerca nel gestionale
            const [searchMarca, setSearchMarca] = useState('');
            const [showOnlyLungoTermine, setShowOnlyLungoTermine] = useState(false);
            
            const initialForm = {
                marca: '', modello: '', prezzo: '', anno: '', km: '', 
                alimentazione: 'Diesel', categoria: 'SUV', descrizione: '', 
                immagini: [], potenza: '', cilindrata: '', colore: '',
                // Nuovi campi privati per Conto Vendita
                isContoVendita: false, contoProprietario: '', contoUbicazione: '', 
                contoRichiesta: '', contoSpese: '', fotoLibretto: ''
            };
            
            const [newCar, setNewCar] = useState(initialForm);

            useEffect(() => {
                const init = async () => {
                    await auth.signInAnonymously();
                    db.collection(COLLECTION_PATH).orderBy('createdAt', 'desc').onSnapshot(snap => {
                        setAutoList(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                        setTimeout(() => { if (window.lucide) window.lucide.createIcons(); }, 100);
                    });
                };
                init();
            }, []);

            const handleFile = (e) => {
                const files = Array.from(e.target.files);
                const remainingSlots = 5 - newCar.immagini.length;
                const filesToProcess = files.slice(0, remainingSlots);

                filesToProcess.forEach(file => {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            let width = img.width;
                            let height = img.height;
                            const MAX_SIZE = 800; 

                            if (width > MAX_SIZE || height > MAX_SIZE) {
                                if (width > height) {
                                    height *= MAX_SIZE / width;
                                    width = MAX_SIZE;
                                } else {
                                    width *= MAX_SIZE / height;
                                    height = MAX_SIZE;
                                }
                            }

                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            const dataUrl = canvas.toDataURL('image/jpeg', 0.5);

                            setNewCar(prev => ({
                                ...prev,
                                immagini: [...prev.immagini, dataUrl].slice(0, 5)
                            }));
                        };
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                });
                e.target.value = ""; 
            };

            const moveImage = (index, direction) => {
                const newImgs = [...newCar.immagini];
                const targetIndex = index + direction;
                if (targetIndex < 0 || targetIndex >= newImgs.length) return;
                
                [newImgs[index], newImgs[targetIndex]] = [newImgs[targetIndex], newImgs[index]];
                setNewCar(prev => ({ ...prev, immagini: newImgs }));
            };

            const removeImage = (index) => {
                setNewCar(prev => ({
                    ...prev,
                    immagini: prev.immagini.filter((_, i) => i !== index)
                }));
            };

            const handleLibretto = (e) => {
                const file = e.target.files[0];
                if(!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        const MAX_SIZE = 1024; 
                        if (width > MAX_SIZE || height > MAX_SIZE) {
                            if (width > height) { height *= MAX_SIZE / width; width = MAX_SIZE; } 
                            else { width *= MAX_SIZE / height; height = MAX_SIZE; }
                        }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        setNewCar(prev => ({ ...prev, fotoLibretto: canvas.toDataURL('image/jpeg', 0.6) }));
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
                e.target.value = "";
            };

            const startEdit = (car) => {
                setEditingId(car.id);
                setNewCar({
                    marca: car.marca || '',
                    modello: car.modello || '',
                    prezzo: car.prezzo || '',
                    anno: car.anno || '',
                    km: car.km || '',
                    alimentazione: car.alimentazione || 'Diesel',
                    categoria: car.categoria || 'SUV',
                    descrizione: car.descrizione || '',
                    potenza: car.potenza || '',
                    cilindrata: car.cilindrata || '',
                    colore: car.colore || '',
                    immagini: car.galleria || (car.immagine ? [car.immagine] : []),
                    isContoVendita: car.isContoVendita || false,
                    contoProprietario: car.contoProprietario || '',
                    contoUbicazione: car.contoUbicazione || '',
                    contoRichiesta: car.contoRichiesta || '',
                    contoSpese: car.contoSpese || '',
                    fotoLibretto: car.fotoLibretto || ''
                });
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const cancelEdit = () => {
                setEditingId(null);
                setNewCar(initialForm);
            };

            const saveCar = async (e) => {
                e.preventDefault();
                if (newCar.immagini.length === 0) return alert("Inserisci almeno una foto!");
                
                setIsSubmitting(true);
                try {
                    // Creiamo l'oggetto da inviare pulendo i valori numerici
                    // Nota: usiamo "potenza" come chiave minuscola per compatibilità
                    const payload = {
                        marca: newCar.marca,
                        modello: newCar.modello,
                        prezzo: Number(newCar.prezzo),
                        km: Number(newCar.km),
                        anno: Number(newCar.anno),
                        alimentazione: newCar.alimentazione,
                        categoria: newCar.categoria,
                        descrizione: newCar.descrizione,
                        potenza: newCar.potenza ? Number(newCar.potenza) : null,
                        cilindrata: newCar.cilindrata ? Number(newCar.cilindrata) : null,
                        colore: newCar.colore || '',
                        immagine: newCar.immagini[0], 
                        galleria: newCar.immagini,
                        // Campi interni privati (conto vendita)
                        isContoVendita: newCar.isContoVendita,
                        contoProprietario: newCar.isContoVendita ? newCar.contoProprietario : null,
                        contoUbicazione: newCar.isContoVendita ? newCar.contoUbicazione : null,
                        contoRichiesta: newCar.isContoVendita ? Number(newCar.contoRichiesta) : null,
                        contoSpese: newCar.isContoVendita ? Number(newCar.contoSpese) : null,
                        fotoLibretto: newCar.isContoVendita ? newCar.fotoLibretto : null,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    };

                    if (editingId) {
                        await db.collection(COLLECTION_PATH).doc(editingId).update(payload);
                        alert("Annuncio aggiornato!");
                    } else {
                        payload.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                        await db.collection(COLLECTION_PATH).add(payload);
                        alert("Auto pubblicata!");
                    }
                    
                    cancelEdit();
                } catch (error) {
                    console.error(error);
                    alert("Errore durante il salvataggio.");
                }
                setIsSubmitting(false);
            };

            const deleteCar = async (id) => {
                if(confirm("Eliminare definitivamente questo annuncio?")) {
                    await db.collection(COLLECTION_PATH).doc(id).delete();
                }
            };

            // Filtraggio lista auto in tempo reale per il gestionale
            const filteredAutoList = autoList.filter(car => {
                const matchMarca = !searchMarca || car.marca?.toLowerCase().includes(searchMarca.toLowerCase());
                const matchNoleggio = !showOnlyLungoTermine || car.categoria === 'Noleggio a Lungo Termine';
                return matchMarca && matchNoleggio;
            });

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <header className="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
                        <div className="flex items-center gap-3">
                            <div className="bg-red-600 p-3 rounded-2xl shadow-lg shadow-red-600/20 text-white">
                                <i data-lucide="layout-dashboard" className="w-6 h-6"></i>
                            </div>
                            <div>
                                <h1 className="text-2xl font-black uppercase tracking-tighter italic">Gestionale <span className="text-red-600">Andrea Branducci</span></h1>
                                <p className="text-[10px] uppercase tracking-[0.2em] text-slate-500 font-bold">Controllo Stock Piazzale</p>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
                        {/* Form di inserimento/modifica */}
                        <div className="lg:col-span-1">
                            <form onSubmit={saveCar} className="glass p-6 rounded-[2rem] sticky top-8 border-white/10">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-lg font-bold flex items-center gap-2 uppercase tracking-tight">
                                        <i data-lucide={editingId ? "edit" : "plus-circle"} className="w-5 h-5 text-red-600"></i> 
                                        {editingId ? 'Modifica Veicolo' : 'Nuovo Veicolo'}
                                    </h2>
                                    {editingId && (
                                        <button type="button" onClick={cancelEdit} className="text-[10px] font-bold uppercase text-slate-400 hover:text-white">Annulla</button>
                                    )}
                                </div>

                                <div className="space-y-4">
                                    <div className="grid grid-cols-3 gap-2">
                                        {newCar.immagini.map((img, idx) => (
                                            <div key={idx} className="img-card relative aspect-square rounded-xl overflow-hidden border border-white/10 bg-slate-900 group">
                                                <img src={img} className="w-full h-full object-cover" />
                                                <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex flex-col justify-between p-1">
                                                    <div className="flex justify-between">
                                                        <button type="button" onClick={() => moveImage(idx, -1)} className="bg-white/20 hover:bg-white/40 p-1 rounded backdrop-blur-md">
                                                            <i data-lucide="chevron-left" className="w-3 h-3 text-white"></i>
                                                        </button>
                                                        <button type="button" onClick={() => removeImage(idx)} className="bg-red-600 hover:bg-red-700 p-1 rounded">
                                                            <i data-lucide="x" className="w-3 h-3 text-white"></i>
                                                        </button>
                                                        <button type="button" onClick={() => moveImage(idx, 1)} className="bg-white/20 hover:bg-white/40 p-1 rounded backdrop-blur-md">
                                                            <i data-lucide="chevron-right" className="w-3 h-3 text-white"></i>
                                                        </button>
                                                    </div>
                                                </div>
                                                {idx === 0 && <div className="absolute bottom-0 left-0 right-0 bg-red-600 text-[8px] text-center font-bold uppercase py-0.5 text-white">Copertina</div>}
                                            </div>
                                        ))}
                                        
                                        {newCar.immagini.length < 5 && (
                                            <label className="flex flex-col items-center justify-center aspect-square rounded-xl border-2 border-dashed border-white/10 bg-white/5 hover:bg-white/10 cursor-pointer transition">
                                                <i data-lucide="plus" className="w-6 h-6 mb-1 opacity-20"></i>
                                                <span className="text-[8px] font-bold uppercase opacity-40">Foto</span>
                                                <input type="file" className="hidden" accept="image/*" multiple onChange={handleFile} />
                                            </label>
                                        )}
                                    </div>

                                    <div className="grid grid-cols-2 gap-3">
                                        <input required placeholder="Marca" className="p-3 rounded-xl text-sm" value={newCar.marca} onChange={e => setNewCar({...newCar, marca: e.target.value})} />
                                        <input required placeholder="Modello" className="p-3 rounded-xl text-sm" value={newCar.modello} onChange={e => setNewCar({...newCar, modello: e.target.value})} />
                                    </div>

                                    <div className="grid grid-cols-3 gap-2">
                                        <input required type="number" placeholder="Prezzo (€)" className="p-3 rounded-xl text-sm" value={newCar.prezzo} onChange={e => setNewCar({...newCar, prezzo: e.target.value})} />
                                        <input required type="number" placeholder="Anno" className="p-3 rounded-xl text-sm" value={newCar.anno} onChange={e => setNewCar({...newCar, anno: e.target.value})} />
                                        <input required type="number" placeholder="KM" className="p-3 rounded-xl text-sm" value={newCar.km} onChange={e => setNewCar({...newCar, km: e.target.value})} />
                                    </div>

                                    <div className="grid grid-cols-3 gap-2">
                                        <input type="number" placeholder="Potenza (CV)" className="p-3 rounded-xl text-sm" value={newCar.potenza} onChange={e => setNewCar({...newCar, potenza: e.target.value})} />
                                        <input type="number" placeholder="Cilindrata (cc)" className="p-3 rounded-xl text-sm" value={newCar.cilindrata} onChange={e => setNewCar({...newCar, cilindrata: e.target.value})} />
                                        <input placeholder="Colore" className="p-3 rounded-xl text-sm" value={newCar.colore} onChange={e => setNewCar({...newCar, colore: e.target.value})} />
                                    </div>

                                    <div className="grid grid-cols-2 gap-3">
                                        <select className="p-3 rounded-xl text-sm" value={newCar.alimentazione} onChange={e => setNewCar({...newCar, alimentazione: e.target.value})}>
                                            <option>Diesel</option>
                                            <option>Benzina</option>
                                            <option>Ibrida</option>
                                            <option>Elettrica</option>
                                            <option>GPL</option>
                                        </select>
                                        <select className="p-3 rounded-xl text-sm" value={newCar.categoria} onChange={e => setNewCar({...newCar, categoria: e.target.value})}>
                                            <option>SUV</option>
                                            <option>Berlina</option>
                                            <option>Utilitaria</option>
                                            <option>Station Wagon</option>
                                            <option>Coupé</option>
                                            <option>Furgone</option>
                                            <option>Fuori Strada</option>
                                            <option>Auto d'epoca</option>
                                            <option>Noleggio Giornaliero</option>
                                            <option>Noleggio a Lungo Termine</option>
                                            <option>Auto da Riparare</option>
                                            <option>Camion</option>
                                            <option>Altri Veicoli</option>
                                        </select>
                                    </div>

                                    <textarea 
                                        placeholder="Descrizione tecnica e optional..." 
                                        className="w-full p-3 rounded-xl text-sm min-h-[100px] resize-none"
                                        value={newCar.descrizione}
                                        onChange={e => setNewCar({...newCar, descrizione: e.target.value})}
                                    ></textarea>

                                    {/* Sezione Conto Vendita (Solo Interno) */}
                                    <div className="border border-white/10 rounded-2xl p-4 bg-white/5 space-y-4">
                                        <label className="flex items-center gap-3 cursor-pointer">
                                            <input type="checkbox" className="w-5 h-5 rounded border-white/20 bg-transparent text-red-600 focus:ring-red-600 focus:ring-offset-slate-900" 
                                                checked={newCar.isContoVendita} 
                                                onChange={e => setNewCar({...newCar, isContoVendita: e.target.checked})} 
                                            />
                                            <span className="font-bold text-sm text-red-400 uppercase tracking-widest">Auto in Conto Vendita</span>
                                        </label>
                                        
                                        {newCar.isContoVendita && (
                                            <div className="grid grid-cols-1 gap-3 animate-in fade-in slide-in-from-top-2 duration-300">
                                                <div className="grid grid-cols-2 gap-3">
                                                    <input placeholder="Proprietario (Nome Cognome)" className="p-3 rounded-xl text-sm" value={newCar.contoProprietario} onChange={e => setNewCar({...newCar, contoProprietario: e.target.value})} />
                                                    <input placeholder="Ubicazione Attuale" className="p-3 rounded-xl text-sm" value={newCar.contoUbicazione} onChange={e => setNewCar({...newCar, contoUbicazione: e.target.value})} />
                                                </div>
                                                <div className="grid grid-cols-2 gap-3">
                                                    <input type="number" placeholder="Richiesta Proprietario (€)" className="p-3 rounded-xl text-sm" value={newCar.contoRichiesta} onChange={e => setNewCar({...newCar, contoRichiesta: e.target.value})} />
                                                    <input type="number" placeholder="Spese Effettuate (€)" className="p-3 rounded-xl text-sm" value={newCar.contoSpese} onChange={e => setNewCar({...newCar, contoSpese: e.target.value})} />
                                                </div>
                                                <div className="flex items-center gap-4 mt-2">
                                                    <label className="flex items-center justify-center gap-2 p-3 rounded-xl border border-white/10 bg-slate-900 hover:bg-slate-800 cursor-pointer transition flex-grow text-sm font-bold text-slate-300">
                                                        <i data-lucide="camera" className="w-4 h-4 text-slate-400"></i> Carica Foto Libretto
                                                        <input type="file" className="hidden" accept="image/*" onChange={handleLibretto} />
                                                    </label>
                                                    {newCar.fotoLibretto && (
                                                        <div className="w-12 h-12 rounded-lg overflow-hidden border border-white/20 flex-shrink-0 relative group">
                                                            <img src={newCar.fotoLibretto} className="w-full h-full object-cover" alt="Libretto" />
                                                            <button type="button" onClick={() => setNewCar({...newCar, fotoLibretto: ''})} className="absolute inset-0 bg-black/60 flex items-center justify-center opacity-0 group-hover:opacity-100 transition">
                                                                <i data-lucide="x" className="w-4 h-4 text-white"></i>
                                                            </button>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        )}
                                    </div>

                                    <button 
                                        disabled={isSubmitting}
                                        className={`w-full py-4 rounded-2xl font-bold uppercase tracking-widest text-sm transition shadow-xl text-white ${isSubmitting ? 'bg-slate-700 animate-pulse' : 'bg-red-600 hover:bg-red-700'}`}
                                    >
                                        {isSubmitting ? 'Salvataggio...' : (editingId ? 'Aggiorna Annuncio' : 'Pubblica nel piazzale')}
                                    </button>
                                </div>
                            </form>
                        </div>

                        {/* Elenco auto caricate */}
                        <div className="lg:col-span-2 space-y-4">
                            <div className="flex flex-col md:flex-row justify-between items-start md:items-end mb-4 gap-4 border-b border-white/10 pb-4">
                                <div>
                                    <h2 className="font-bold uppercase tracking-widest text-xs text-slate-500 mb-1">Auto Online ({filteredAutoList.length})</h2>
                                    <p className="text-[10px] text-slate-500 font-bold uppercase italic">Andrea Branducci - Cloud Database</p>
                                </div>
                                
                                {/* Filtri di Ricerca Gestionale */}
                                <div className="flex flex-col sm:flex-row gap-2 w-full md:w-auto">
                                    <div className="relative">
                                        <i data-lucide="search" className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                                        <input 
                                            type="text" 
                                            placeholder="Cerca per Marca..." 
                                            className="pl-9 p-2 rounded-xl text-sm w-full sm:w-48 bg-slate-800"
                                            value={searchMarca}
                                            onChange={e => setSearchMarca(e.target.value)}
                                        />
                                    </div>
                                    <button 
                                        onClick={() => setShowOnlyLungoTermine(!showOnlyLungoTermine)}
                                        className={`flex items-center justify-center gap-2 px-4 py-2 rounded-xl text-[10px] font-bold uppercase tracking-widest transition border ${showOnlyLungoTermine ? 'bg-red-600 border-red-600 text-white' : 'bg-transparent border-white/20 text-slate-400 hover:text-white'}`}
                                    >
                                        <i data-lucide="calendar-clock" className="w-4 h-4"></i> Noleggio L.T.
                                    </button>
                                </div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {filteredAutoList.map(car => (
                                    <div key={car.id} className="glass p-4 rounded-3xl flex gap-4 items-center group relative overflow-hidden hover:bg-white/[0.05] transition-all border-white/5">
                                        <div className="w-24 h-24 rounded-2xl overflow-hidden flex-shrink-0 border border-white/5 bg-slate-800">
                                            <img src={car.immagine} className="w-full h-full object-cover" />
                                        </div>
                                        <div className="flex-grow">
                                            <h3 className="font-bold uppercase text-sm leading-tight text-white">{car.marca} <span className="text-red-600">{car.modello}</span></h3>
                                            <div className="text-[10px] text-slate-400 font-bold mt-1 uppercase">
                                                {car.anno} • {car.km?.toLocaleString()} KM • <span className="text-white">€{car.prezzo?.toLocaleString()}</span>
                                            </div>
                                            <div className="flex flex-wrap gap-2 mt-2">
                                                {car.isContoVendita && <span className="text-[8px] bg-orange-600/20 px-1.5 py-0.5 rounded text-orange-400 font-bold uppercase border border-orange-600/30">Conto Vendita</span>}
                                                {car.potenza && <span className="text-[8px] bg-red-600/20 px-1.5 py-0.5 rounded text-red-400 font-bold uppercase">{car.potenza} CV</span>}
                                                {car.cilindrata && <span className="text-[8px] bg-slate-800 px-1.5 py-0.5 rounded text-slate-400 font-bold uppercase">{car.cilindrata} cc</span>}
                                                {car.colore && <span className="text-[8px] bg-slate-800 px-1.5 py-0.5 rounded text-slate-400 font-bold uppercase">{car.colore}</span>}
                                            </div>
                                        </div>
                                        
                                        <div className="flex flex-col gap-2">
                                            <button onClick={() => startEdit(car)} className="p-2 bg-blue-600/10 text-blue-400 rounded-lg md:opacity-0 group-hover:opacity-100 transition hover:bg-blue-600 hover:text-white">
                                                <i data-lucide="edit-3" className="w-4 h-4"></i>
                                            </button>
                                            <button onClick={() => deleteCar(car.id)} className="p-2 bg-red-600/10 text-red-600 rounded-lg md:opacity-0 group-hover:opacity-100 transition hover:bg-red-600 hover:text-white">
                                                <i data-lucide="trash-2" className="w-4 h-4"></i>
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
